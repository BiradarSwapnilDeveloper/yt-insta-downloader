services:
  - type: web
    name: nexdown-downloader
    env: node
    plan: free
    buildCommand: >
      npm install &&
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp &&
      chmod a+rx /usr/local/bin/yt-dlp
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
